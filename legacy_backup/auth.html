<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CoBuy - Authentication</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="auth.css">
</head>

<body>

    <div class="auth-container">

        <form class="form-box" id="registerForm" onsubmit="return registerUser(event)">

            <h2>Register</h2>

            <input type="text" id="regUsername" placeholder="Username" required>

            <input type="email" id="regEmail" placeholder="Email" required>

            <input type="password" id="regPassword" placeholder="Password" minlength="6" required>

            <input type="password" id="regConfirm" placeholder="Confirm Password" required>

            <div class="checkbox">
                <input type="checkbox" id="terms" required>
                <label for="terms">Agree to the Terms and Conditions</label>
            </div>

            <button type="submit" class="btn">Register</button>

            <p class="switch-text">
                Already have an account?
                <span onclick="showLogin()">Login</span>
            </p>

        </form>

        <!-- LOGIN FORM -->
        <form class="form-box active" id="loginForm" onsubmit="return loginUser(event)">

            <h2>Login</h2>

            <label>Username</label>
            <input type="text" id="loginUsername" placeholder="Username" required>

            <div class="password-row">
                <label>Password</label>
                <a href="#">Forgot Password</a>
            </div>

            <input type="password" id="loginPassword" placeholder="Password" required>

            <button type="submit" class="btn">Login</button>

            <p class="switch-text">
                Don't have an account?
                <span onclick="showRegister()">Register</span>
            </p>

        </form>


        <!-- REGISTER FORM -->


    </div>

    <script>
        function registerUser(event) {
            event.preventDefault(); // stop normal submit

            let password = document.getElementById("regPassword").value;
            let confirm = document.getElementById("regConfirm").value;

            if (password !== confirm) {
                alert("Passwords do not match!");
                return false;
            }

            alert("Registration successful! Please login.");

            showLogin(); // switch to login form
            return false;
        }

        function loginUser(event) {
            event.preventDefault();

            alert("Login successful!");
            window.location.href = "dashboard.html";
        }

        function showRegister() {
            document.getElementById("loginForm").classList.remove("active");
            document.getElementById("registerForm").classList.add("active");
        }

        function showLogin() {
            document.getElementById("registerForm").classList.remove("active");
            document.getElementById("loginForm").classList.add("active");
        }

        window.onload = function () {
            const urlParams = new URLSearchParams(window.location.search);

            if (urlParams.get("register") === "true") {
                showRegister();
            }
        }
    </script>

</body>

</html>
